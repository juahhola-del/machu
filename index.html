<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fila Machu Picchu</title>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://klmikzfstasntvgmxsuj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtsbWlremZzdGFzbnR2Z214c3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTUyMjYsImV4cCI6MjA5MDk3MTIyNn0.AJLc5hqP6BLS1hd99SqV7xKIWZPP_8cS1gF16PiHr7o";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// ---------- ESTADO ----------
async function cargarEstado() {
  const { data } = await supabase.from("v_home_live_status").select("*").limit(1);
  const s = data?.[0];
  if (!s) return;

  let estadoColor = "green";
  if (s.turnos_disponibles < 20) estadoColor = "red";
  else if (s.turnos_disponibles < 50) estadoColor = "orange";

  document.getElementById("estado").innerHTML = `
    <div class="card big">
      <h2>Estado actual</h2>
      <div class="estado ${estadoColor}">
        ${s.turnos_disponibles > 20 ? "🟢 Aún alcanzas" : "🔴 Alto riesgo"}
      </div>
      <p><b>Disponibles:</b> ${s.turnos_disponibles}</p>
      <p><b>Entregados:</b> ${s.turnos_entregados}</p>
      <p><b>Fila estimada:</b> ${s.fila_estimada}</p>
      <p><b>Huayna:</b> ${s.etiqueta_huayna}</p>
    </div>
  `;
}

// ---------- RUTAS ----------
async function cargarRutas() {
  const { data } = await supabase.from("v_home_routes_live").select("*");
  let html = "";

  data.forEach(r => {
    let color = "green";
    if (r.disponibles < 10) color = "red";
    else if (r.disponibles < 30) color = "orange";

    html += `
      <div class="card ruta ${color}">
        <h3>${r.route_name}</h3>
        <p>Disponibles: ${r.disponibles}</p>
        <p>Riesgo: ${r.riesgo_agotamiento}</p>
      </div>
    `;
  });

  document.getElementById("rutas").innerHTML = html;
}

// ---------- SIMULADOR ----------
async function simular() {
  const fecha = document.getElementById("fecha").value;

  const { data } = await supabase
    .from("v_visit_date_full_experience")
    .select("*")
    .eq("visit_date", fecha)
    .limit(1);

  const s = data?.[0];

  document.getElementById("simulacion").innerHTML = `
    <div class="card">
      <p><b>Compra:</b> ${s.purchase_date}</p>
      <p><b>Fila:</b> ${s.fila_preventa_estimada}</p>
      <p><b>Hora recomendada:</b> ${s.hora_recomendada_huayna}</p>
      <p><b>Clima:</b> ${s.visibilidad}</p>
    </div>
  `;
}

// ---------- PROBABILIDAD ----------
async function calcular() {
  const personas = parseInt(document.getElementById("personas").value || 0);
  const hora = document.getElementById("hora").value;

  const { data } = await supabase.rpc("submit_photo_report_and_get_probability", {
    p_report_date: new Date().toISOString().slice(0,10),
    p_report_time: hora,
    p_image_url: "https://via.placeholder.com/400",
    p_people_ahead_estimate: personas,
    p_desired_route_code: "ruta_3a",
    p_desired_route_name: "Huayna"
  });

  const r = data?.[0];

  document.getElementById("resultado").innerHTML = `
    <div class="card resultado">
      <h3>${r.probabilidad_estimada_pct}% probabilidad</h3>
      <p>${r.recomendacion_texto}</p>
    </div>
  `;
}

// ---------- FOTOS ----------
async function cargarFotos() {
  const { data } = await supabase
    .from("v_queue_photo_feed")
    .select("*")
    .limit(3);

  let html = "";
  data.forEach(f => {
    html += `
      <div class="card">
        <img src="${f.image_url}" />
        <p>${f.report_time} · ${f.people_ahead_estimate} personas</p>
      </div>
    `;
  });

  document.getElementById("fotos").innerHTML = html;
}

// INIT
cargarEstado();
cargarRutas();
cargarFotos();

window.simular = simular;
window.calcular = calcular;

</script>

<style>
body {
  background:#0f172a;
  color:white;
  font-family: Inter, Arial;
  margin:0;
  padding:20px;
}

h1 {
  font-size:28px;
  margin-bottom:10px;
}

.container {
  max-width:1100px;
  margin:auto;
}

.hero {
  margin-bottom:30px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.card.big {
  text-align:center;
}

.estado {
  font-size:22px;
  margin:10px 0;
}

.green { color:#22c55e; }
.orange { color:#facc15; }
.red { color:#ef4444; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
  gap:10px;
}

.ruta {
  border-left:4px solid;
}

.ruta.green { border-color:#22c55e; }
.ruta.orange { border-color:#facc15; }
.ruta.red { border-color:#ef4444; }

input, button {
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:none;
}

button {
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}

img {
  width:100%;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
  <h1>¿Alcanzarás entrada a Machu Picchu?</h1>
  <p>Datos reales de la fila presencial en tiempo casi real.</p>
</div>

<div id="estado">Cargando estado...</div>

<h2>Rutas en vivo</h2>
<div id="rutas" class="grid"></div>

<h2>Simular visita</h2>
<input type="date" id="fecha">
<button onclick="simular()">Simular</button>
<div id="simulacion"></div>

<h2>Estoy en la fila</h2>
<input type="time" id="hora">
<input type="number" id="personas" placeholder="Personas delante">
<button onclick="calcular()">Calcular</button>
<div id="resultado"></div>

<h2>Fotos reales</h2>
<div id="fotos" class="grid"></div>

</div>

</body>
</html>
