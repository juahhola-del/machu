<!-- MACHULINE CLEAN VERSION FINAL -->
<!-- RESUMIDO: UI compacta + reportes reales + selector dropdown -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MachuLine</title>

<style>
body{margin:0;font-family:Arial;background:#071329;color:#fff}
.container{max-width:1100px;margin:auto;padding:16px}

/* LOGO */
.logo{width:200px}

/* CLIMA */
.clima{font-size:13px;margin-top:10px}
.clima div{display:flex;justify-content:space-between}

/* GRID REPORTES */
.report-grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:12px;
}
@media(max-width:720px){
 .report-grid{grid-template-columns:1fr;}
}

/* CARDS */
.card{background:#111;border-radius:12px;padding:12px}
.card img{width:100%;border-radius:8px}

/* BOTON */
button{padding:10px 14px;border:none;border-radius:8px;background:#22c55e;font-weight:bold}

</style>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient("TU_URL","TU_KEY");

let limiteReportes = 3;

async function cargarReportes(){
 const el = document.getElementById("reportes");

 const {data} = await supabase
  .from("ticket_queue_photo_reports")
  .select("*")
  .order("created_at",{ascending:false})
  .limit(limiteReportes);

 if(!data){ el.innerHTML="Sin datos"; return; }

 el.innerHTML = data.map(r=>`
  <div class="card">
   ${r.image_url ? `<img src="${r.image_url}">` : ""}
   <div>${r.report_date} | ${r.report_time}</div>
   <div>${r.desired_route_name}</div>
   <div>${r.comment || ""}</div>
  </div>
 `).join("");
}

function mostrarMas(){
 limiteReportes += 3;
 cargarReportes();
}

window.addEventListener("DOMContentLoaded",cargarReportes);

window.mostrarMas = mostrarMas;
</script>

</head>

<body>
<div class="container">

<img src="/Logo.png" class="logo">

<div class="clima">
 <div><span>☁️ Nublado</span> | <span>🌡️ 13°C</span></div>
 <div><span>💧 Alta</span> | <span>👁️ Media</span></div>
</div>

<h2>Estado en vivo 🔴</h2>

<select>
<option>Waynapicchu</option>
<option>Clásico</option>
</select>

<h2>Reportes reales</h2>

<div id="reportes" class="report-grid"></div>

<div style="text-align:center;margin-top:10px">
 <button onclick="mostrarMas()">Ver más</button>
</div>

</div>
</body>
</html>
